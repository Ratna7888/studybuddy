services:
  - type: web
    name: studybuddy-api
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./studybuddy.db
      - key: LIGHTWEIGHT_MODE
        value: "true"